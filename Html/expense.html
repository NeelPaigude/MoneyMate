<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap');
    </style>
    <link rel="stylesheet" href="../Css/expensestyle.css">
</head>
<body class="darktheme">

    <!-- EXPENSE MESSAGE SECTION -->
     <div id="warningAlert" class="alert alert-warning d-none mx-3 mt-2">
        Expense exceeds current balance!
     </div>
    
    <!-- HEADER DIV -->
    <div class=".container-fluid header-div">
        <div id="logo">
                <img src="../Images/Money-Mate-Logo-img.png" alt=""><h3 id="bname">Money<span>Mate</span></h3>
        </div>
        <div id="button-div">
                <button class="bbtn" id="dark">Dark Mode<img src="../Images/night-mode.png" alt=""></button> <button id="light" class="bbtn">Light Mode<img src="../Images/Light-mode.png" alt=""></button>
        </div>
    </div>


    <!-- INCOME SECTION -->
    <div class="container-fluid hero-div">

        <div class=" sub-div">
            <h2 >Add Expense</h2>
            <form id="expense-div">
                <label>Amount : </label> <input type="text" id="amount" required>
                <label>Date : </label> <input type="date" id="date" required>
                <label>Payment Method : </label> 
                <select name="" id="pmethod">
                    <option value="Cash">Cash</option>
                    <option value="UPI">UPI Payment</option>
                    <option value="Credit-Card">Credit Card</option>
                    <option value="Debit-Card">Debit Card</option>
                </select>
                <label>Category : </label>
                <select name="" id="category">
                    <option value="Food">Food</option>
                    <option value="Rent">Rent</option>
                    <option value="Fuel">Fuel</option>
                    <option value="Transportation">Transportation</option>
                    <option value="Utilities">Utilities</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Healthcare">Healthcare</option>
                    <option value="Education">Education</option>
                    <option value="Others">Others</option>
                </select>
                <label>Descriprtion (Optional)</label>
                <textarea name="" id="descriprtion" rows="5" cols="40"></textarea>
                <button type="submit" id="addexpense">+ Add Expense</button>
                <button id="clearexpense">Clear All Data</button>
            </form>
        </div>

        <div id="Expense-table">
            <div id="Expense-Balance">
                <div class="col-6" id="Balance">
                    <div class="icon-circle">
                        <i class="bi bi-bank"></i>
                    </div>
                    <div id="Balance-info">
                        <h2>Current Balance</h2>
                        <h3 id="cbalance">₹0</h3>
                    </div>
                </div>
                <div class="col-6" id="texpense">
                    <div class="icon-circle">
                        <i class="bi bi-cart-dash"></i>
                    </div>
                    <div id="texpense-info">
                        <h2>Total Expense</h2>
                        <h3 id="expense-total">₹0</h3>
                    </div>
                </div>
            </div>
            <div id="table-container">    
                <table cellpadding="25px">
                    <thead>
                        <tr>
                            <th>Amount</th>
                            <th>Date</th>
                            <th>Payment Method</th>
                            <th>Source</th>
                            <th>Descriprtion</th>
                        </tr>
                    </thead>
                    <tbody id="tablebody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- BACK SECTION -->
    <div id="back">
        <a href="../Html/dashboard.html"><button id="prev-btn">Back  ⬅</button></a>
    </div>

    <!-- FOOTER SECTION -->
    <div class="container-fluid footer">
        <h5>Track.Save.Grow</h5>
        <h5>@2026 MoneyMate all rights reserved</h5>
    </div>

    <script src="../Javascript/expense.js"></script>
</body>
</html>
