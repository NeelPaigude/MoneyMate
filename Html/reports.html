<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap');
    </style>
    <link rel="stylesheet" href="../Css/reportstyle.css">
</head>
<body class="darktheme">
    <!-- HEADER SECTION -->
    <div class=".container-fluid header-div">
        <div id="logo">
                <img src="../Images/Money-Mate-Logo-img.png" alt=""><h3 id="bname">Money<span>Mate</span></h3>
        </div>
        <div id="button-div">
                <button class="bbtn" id="dark">Dark Mode<img src="../Images/night-mode.png" alt=""></button> <button id="light" class="bbtn">Light Mode<img src="../Images/Light-mode.png" alt=""></button>
        </div>
    </div>

    <!-- HERO DIV -->
    <div class="container-fluid hero-div">
        <div id="sub-div">
            <h1>Reports & Analytics</h1>
            <h3>Visual insights into your spending and earnings</h3>
        </div>
    </div>

    <!-- INCOME EXPENSE DIV -->
    <div class="container-fluid income-expense-div">     
            <div id="Hexpense-div">
                <div id="expense-card">
                    <h2>HIGHEST EXPENSE</h2>
                    <h3 id="highestexpense">₹0</h3>
                    <h5 id="catogery"></h5>
                </div>
                <div class="icon-circle">
                    <i class="bi bi-arrow-down"></i>
                </div>
            </div>
        <div id="Hincome-div">
            <div id="income-card">
                <h2>HIGHEST INCOME</h2>
                <h3 id="highestincome">₹0</h3>
                <h5 id="source"></h5>
            </div>
            <div class="icon-circle">
                <i class="bi bi-arrow-up"></i>
            </div>
        </div>
    </div>

    <!-- CHARTS SECTION -->
    <div class="container-fluid income-expense-chart">
        <div id="expenseCategoryChartContainer">
            <canvas id="expenseCategoryChart">

            </canvas>
        </div>
        <div id="incomeCategoryChartContainer">
            <canvas id="incomeCategoryChart">

            </canvas>
        </div>
    </div>

    <!-- SAVINGS TRANSACTION SECTION -->
    <div class="container-fluid cards-container">
        <div class="cards">
            <h2>Net Savings</h2>
            <h3 id="nSavings">₹0</h3>
        </div>
        <div class="cards">
            <h2>Savings Rate</h2>
            <h3 id="SavingsRate">0%</h3>
        </div>
        <div class="cards">
            <h2>Total Transctions</h2>
            <h3 id="transactions">0</h3>
        </div>
    </div>

    <!-- BACK SECTION -->
    <div id="back">
        <a href="../Html/dashboard.html"><button id="prev-btn">Back  ⬅</button></a>
    </div>

    <!-- FOOTER SECTION -->
    <div class="container-fluid footer">
        <h5>Track.Save.Grow</h5>
        <h5>@2026 MoneyMate all rights reserved</h5>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../Javascript/reports.js"></script>
</body>
</html>
