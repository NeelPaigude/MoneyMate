<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap');
    </style>
    <link rel="stylesheet" href="../Css/loginstyle.css">
</head>
<body>
    <div id="logo">
        <img src="../Images/Money-Mate-Logo-img.png" alt=""><h3>Money<span>Mate</span></h3>
    </div>
    <div id="login-img-div">
        <img src="../Images/login-img.jpg" alt="">
        <form action="./dashboard.html" id="login-div" method="post">
            <h5>Login to Get Started</h5>
            <label for="">Enter Username : </label>
            <input type="text" placeholder="Username">
            <label for="">Enter Password : </label>
            <input type="password" placeholder="Password">
            <button>Login</button>
            <a href="">Sign up</a>
        </form>
    </div>

    <script>
        document.getElementById("login-div").addEventListener("submit", function(event) {
            event.preventDefault(); // Prevent form submission
            window.location.href = "./dashboard.html";
        });
    </script>

</body>
</html>
